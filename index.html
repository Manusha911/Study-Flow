<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow — Your Academic Companion</title>
    <meta name="description" content="Organize assignments, plan your study schedule, track progress, and achieve your academic goals." />
    <link rel="icon" type="image/png" href="/assets/logo.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: 'hsl(var(--border))',
              input: 'hsl(var(--input))',
              ring: 'hsl(var(--ring))',
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              primary: {
                DEFAULT: 'hsl(var(--primary))',
                foreground: 'hsl(var(--primary-foreground))',
              },
              secondary: {
                DEFAULT: 'hsl(var(--secondary))',
                foreground: 'hsl(var(--secondary-foreground))',
              },
              destructive: {
                DEFAULT: 'hsl(var(--destructive))',
                foreground: 'hsl(var(--destructive-foreground))',
              },
              muted: {
                DEFAULT: 'hsl(var(--muted))',
                foreground: 'hsl(var(--muted-foreground))',
              },
              accent: {
                DEFAULT: 'hsl(var(--accent))',
                foreground: 'hsl(var(--accent-foreground))',
              },
              popover: {
                DEFAULT: 'hsl(var(--popover))',
                foreground: 'hsl(var(--popover-foreground))',
              },
              card: {
                DEFAULT: 'hsl(var(--card))',
                foreground: 'hsl(var(--card-foreground))',
              },
              success: {
                DEFAULT: 'hsl(var(--success))',
                foreground: 'hsl(var(--success-foreground))',
              },
              warning: {
                DEFAULT: 'hsl(var(--warning))',
                foreground: 'hsl(var(--warning-foreground))',
              },
              info: {
                DEFAULT: 'hsl(var(--info))',
                foreground: 'hsl(var(--info-foreground))',
              },
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              display: ['"Space Grotesk"', 'sans-serif'],
            },
            borderRadius: {
              lg: 'var(--radius)',
              md: 'calc(var(--radius) - 2px)',
              sm: 'calc(var(--radius) - 4px)',
            },
            boxShadow: {
              card: 'var(--shadow-md)',
              'card-hover': 'var(--shadow-lg)',
              glow: 'var(--shadow-glow)',
            }
          }
        }
      }
    </script>

    <!-- Custom CSS Variables and Global Rules -->
    <style type="text/tailwindcss">
      @layer base {
        :root {
          --background: 210 30% 98%;
          --foreground: 220 30% 12%;

          --card: 0 0% 100%;
          --card-foreground: 220 30% 12%;

          --popover: 0 0% 100%;
          --popover-foreground: 220 30% 12%;

          --primary: 225 65% 52%;
          --primary-foreground: 0 0% 100%;

          --secondary: 210 40% 94%;
          --secondary-foreground: 220 30% 20%;

          --muted: 210 25% 95%;
          --muted-foreground: 215 16% 47%;

          --accent: 170 60% 45%;
          --accent-foreground: 0 0% 100%;

          --destructive: 0 72% 56%;
          --destructive-foreground: 0 0% 100%;

          --border: 214 25% 90%;
          --input: 214 25% 90%;
          --ring: 225 65% 52%;

          --radius: 0.75rem;

          --success: 145 60% 42%;
          --success-foreground: 0 0% 100%;
          --warning: 38 92% 50%;
          --warning-foreground: 0 0% 100%;
          --info: 205 85% 55%;
          --info-foreground: 0 0% 100%;

          --gradient-primary: linear-gradient(135deg, hsl(225, 65%, 52%), hsl(250, 70%, 58%));
          --gradient-accent: linear-gradient(135deg, hsl(170, 60%, 45%), hsl(195, 70%, 50%));
          --gradient-warm: linear-gradient(135deg, hsl(25, 90%, 55%), hsl(350, 80%, 58%));
          --gradient-hero: linear-gradient(160deg, hsl(225, 65%, 52%) 0%, hsl(250, 70%, 58%) 50%, hsl(280, 60%, 55%) 100%);

          --shadow-sm: 0 1px 3px hsl(220 30% 12% / 0.06);
          --shadow-md: 0 4px 12px hsl(220 30% 12% / 0.08);
          --shadow-lg: 0 8px 30px hsl(220 30% 12% / 0.12);
          --shadow-glow: 0 0 20px hsl(225 65% 52% / 0.25);
        }

        .dark {
          --background: 222 30% 8%;
          --foreground: 210 30% 94%;

          --card: 222 25% 12%;
          --card-foreground: 210 30% 94%;

          --popover: 222 25% 12%;
          --popover-foreground: 210 30% 94%;

          --primary: 225 65% 60%;
          --primary-foreground: 0 0% 100%;

          --secondary: 220 20% 18%;
          --secondary-foreground: 210 30% 90%;

          --muted: 220 20% 16%;
          --muted-foreground: 215 16% 60%;

          --accent: 170 60% 50%;
          --accent-foreground: 0 0% 100%;

          --destructive: 0 62.8% 50%;
          --destructive-foreground: 0 0% 100%;

          --border: 220 20% 20%;
          --input: 220 20% 20%;
          --ring: 225 65% 60%;

          --success: 145 55% 48%;
          --warning: 38 85% 55%;
          --info: 205 80% 60%;

          --gradient-primary: linear-gradient(135deg, hsl(225, 65%, 60%), hsl(250, 70%, 65%));
          --gradient-hero: linear-gradient(160deg, hsl(225, 65%, 45%) 0%, hsl(250, 70%, 50%) 50%, hsl(280, 60%, 48%) 100%);

          --shadow-sm: 0 1px 3px hsl(0 0% 0% / 0.2);
          --shadow-md: 0 4px 12px hsl(0 0% 0% / 0.3);
          --shadow-lg: 0 8px 30px hsl(0 0% 0% / 0.4);
          --shadow-glow: 0 0 20px hsl(225 65% 60% / 0.3);
        }
      }

      @layer base {
        body {
          background-color: hsl(var(--background));
          color: hsl(var(--foreground));
          font-family: 'Plus Jakarta Sans', sans-serif;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, h4, h5, h6 {
          font-family: 'Space Grotesk', sans-serif;
        }
      }

      @layer utilities {
        .gradient-primary {
          background: var(--gradient-primary);
        }
        .gradient-accent {
          background: var(--gradient-accent);
        }
        .gradient-warm {
          background: var(--gradient-warm);
        }
        .gradient-hero {
          background: var(--gradient-hero);
        }
        .glass {
          backdrop-filter: blur(12px);
          background: hsl(var(--card) / 0.8);
        }
        .animate-pulse-glow {
          animation: pulseGlow 2s infinite ease-in-out;
        }
      }

      @keyframes pulseGlow {
        0%, 100% {
          box-shadow: 0 0 10px hsl(var(--primary) / 0.15);
        }
        50% {
          box-shadow: 0 0 22px hsl(var(--primary) / 0.45);
        }
      }
    </style>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-background text-foreground transition-colors duration-300">
    <!-- Main Shell container -->
    <div id="root" class="min-h-screen flex flex-col">
      <!-- SPA Views Rendered Here -->
    </div>

    <!-- Global Toast notification system -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[9999] flex flex-col gap-2 max-w-sm w-full"></div>

    <!-- App Script -->
    <script type="module" src="/app.js"></script>
  </body>
</html>
